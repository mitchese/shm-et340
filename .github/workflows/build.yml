name: Build for Raspberry Pi / ARM

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [arm, arm64]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
        check-latest: true

    - name: Install dependencies
      run: go mod download

    - name: Build
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: |
        if [ "${{ matrix.goarch }}" = "arm" ]; then
          export GOARM=7
        fi
        go build -v -o shm-et340-${{ matrix.goos }}-${{ matrix.goarch }} .

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: shm-et340-${{ matrix.goos }}-${{ matrix.goarch }}
        path: shm-et340-${{ matrix.goos }}-${{ matrix.goarch }}

    - name: Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: shm-et340-${{ matrix.goos }}-${{ matrix.goarch }}
